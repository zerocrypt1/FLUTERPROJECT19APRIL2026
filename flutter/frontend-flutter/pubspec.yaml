name: flutter_aakrit
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^10.1.0
  flutter_dotenv: ^5.1.0
  http: ^1.2.2
  google_sign_in: ^6.2.2
  flutter_secure_storage: ^8.0.0
  razorpay_flutter: ^1.3.7
  fluttertoast: ^8.2.8
  geocoding: ^2.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  google_fonts: ^4.0.4
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # CORRECTED ASSETS SECTION
  # Ensure there are exactly 2 spaces before 'assets' and 4 spaces before the '-'
  assets:
    - .env
    # If you move your .env to an assets folder, use: - assets/.env